name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364e1ed227 # v4.2.2
      - uses: astral-sh/setup-uv@38f3f104fae9b1fc2c44d0acd0eb8bcd8139ce2c # v4.2.0
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --all-packages --all-groups --all-extras
      - name: Validate configuration
        run: uv run agent-harness config-check
      - name: Lint feature catalog
        run: uv run agent-harness catalog-lint
      - name: Run tests
        run: uv run pytest
